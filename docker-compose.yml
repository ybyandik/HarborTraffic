# Port Adriano — Kafka + Airflow weather DAG
#   ./scripts/run_all.sh          # full stack (infra + tmux workers)
#   ./scripts/run_all.sh infra    # docker + topics + weather seed only
#   ./scripts/run_all.sh stop
#
# Airflow UI: http://localhost:8080  (boot ~2–4 min after up -d)
#   Login: airflow / airflow
#   DAG: port_adriano_weather_ingest

services:
  kafka:
    image: apache/kafka:4.3.0
    container_name: port-adriano-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: port-adriano-airflow:2.10.4
    container_name: port-adriano-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__WEB_SERVER_HOST: "0.0.0.0"
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: "8080"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
      PYTHONPATH: /opt/port-adriano
      KAFKA_BOOTSTRAP: kafka:29092
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/port-adriano
    command: standalone
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health | grep -q healthy"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    depends_on:
      - kafka
